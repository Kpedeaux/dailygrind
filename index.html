<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF8F5" />
  <title>The Daily Grind — CR Coffee Shop</title>
  <meta name="description" content="A coffee and New Orleans themed daily word puzzle from CR Coffee Shop. One word a day. Six guesses. Five letters. Serving Antique Roasted Coffee since 2015." />

  <!-- Open Graph / SMS link preview -->
  <meta property="og:title" content="The Daily Grind" />
  <meta property="og:description" content="A daily five-letter word puzzle from CR Coffee Shop. One word a day. Six guesses. New Orleans, est. 2015." />
  <meta property="og:url" content="https://dailygrind.crcoffeenola.com" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://dailygrind.crcoffeenola.com/assets/img/cr-wordmark.jpg" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" type="image/png" href="assets/img/favicon-32x32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Google Fonts: Playfair Display (editorial serif), Inter (body), JetBrains Mono (eyebrow labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css?v=4" />
  <link rel="stylesheet" href="css/game.css?v=4" />

  <!-- Google Analytics 4 (shared property with the rest of CR) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2W65P8DDH9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2W65P8DDH9', { send_page_view: true });
  </script>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-header__title">Daily Grind</h1>
      <div class="app-header__actions">
        <button id="btn-help" class="icon-btn" type="button" aria-label="How to play">?</button>
        <button id="btn-stats" class="icon-btn" type="button" aria-label="Stats">≣</button>
        <button id="btn-settings" class="icon-btn" type="button" aria-label="Settings">⚙</button>
      </div>
    </header>

    <main class="board-wrap">
      <div id="board" class="board" role="grid" aria-label="Guess board"></div>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <section id="keyboard" class="keyboard" role="group" aria-label="On-screen keyboard"></section>

    <footer class="app-footer">
      <a class="footer-cta" href="https://crcoffeenola.com" target="_blank" rel="noopener">
        Visit CR Coffee Shop
      </a>
      <p class="footer-tagline">Serving Antique Roasted Coffee.</p>
      <p class="footer-meta">Four Locations · New Orleans</p>
    </footer>
  </div>

  <div id="overlay" class="overlay" hidden></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
